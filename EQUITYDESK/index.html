MSC,XNYS,68,6.95%,0.0001%,Studio City International Holdings Limited,Hong Kong
HKD,XNYS,"49,923",5.13%,0.1074%,AMTD Digital Inc.,Singapore
`;

let data = [];
let sortCol = 'nyse';
let sortDir = 'desc';

const countryFlags = {
  'China': '\u{1F1E8}\u{1F1F3}', 'Brazil': '\u{1F1E7}\u{1F1F7}', 'Japan': '\u{1F1EF}\u{1F1F5}',
  'South Korea': '\u{1F1F0}\u{1F1F7}', 'India': '\u{1F1EE}\u{1F1F3}', 'United Kingdom': '\u{1F1EC}\u{1F1E7}',
  'Taiwan': '\u{1F1F9}\u{1F1FC}', 'Mexico': '\u{1F1F2}\u{1F1FD}', 'Argentina': '\u{1F1E6}\u{1F1F7}',
  'Chile': '\u{1F1E8}\u{1F1F1}', 'Colombia': '\u{1F1E8}\u{1F1F4}', 'South Africa': '\u{1F1FF}\u{1F1E6}',
  'Israel': '\u{1F1EE}\u{1F1F1}', 'Germany': '\u{1F1E9}\u{1F1EA}', 'Netherlands': '\u{1F1F3}\u{1F1F1}',
  'Australia': '\u{1F1E6}\u{1F1FA}', 'France': '\u{1F1EB}\u{1F1F7}', 'Denmark': '\u{1F1E9}\u{1F1F0}',
  'Singapore': '\u{1F1F8}\u{1F1EC}', 'Ireland': '\u{1F1EE}\u{1F1EA}', 'Spain': '\u{1F1EA}\u{1F1F8}',
  'Norway': '\u{1F1F3}\u{1F1F4}', 'Switzerland': '\u{1F1E8}\u{1F1ED}', 'Belgium': '\u{1F1E7}\u{1F1EA}',
  'Luxembourg': '\u{1F1F1}\u{1F1FA}', 'Peru': '\u{1F1F5}\u{1F1EA}', 'Turkey': '\u{1F1F9}\u{1F1F7}',
  'Italy': '\u{1F1EE}\u{1F1F9}', 'Philippines': '\u{1F1F5}\u{1F1ED}', 'Indonesia': '\u{1F1EE}\u{1F1E9}',
  'Finland': '\u{1F1EB}\u{1F1EE}', 'Sweden': '\u{1F1F8}\u{1F1EA}', 'Hong Kong': '\u{1F1ED}\u{1F1F0}',
  'United States': '\u{1F1FA}\u{1F1F8}', 'United Arab Emirates': '\u{1F1E6}\u{1F1EA}'
};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  lines.shift();
  return lines.map(line => {
    const parts = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { parts.push(cur); cur = ''; }
      else { cur += ch; }
    }
    parts.push(cur);
    return {
      symbol: parts[0]?.trim() || '',
      mic: parts[1]?.trim() || '',
      nyse: parseInt((parts[2] || '0').replace(/,/g, '').trim()) || 0,
      nyse_pct: parseFloat((parts[3] || '0').replace('%', '').trim()) || 0,
      monthly_pct: parseFloat((parts[4] || '0').replace('%', '').trim()) || 0,
      name: parts[5]?.trim() || '',
      country: parts[6]?.trim() || ''
    };
  }).filter(r => r.symbol);
}

function fmt(n) { return n.toLocaleString(); }

function render() {
  const search = document.getElementById('search').value.toUpperCase();
  const country = document.getElementById('country-filter').value;

  let filtered = data.filter(r => {
    if (search && !r.symbol.includes(search) && !r.name.toUpperCase().includes(search)) return false;
    if (country !== 'ALL' && r.country !== country) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const maxNysePct = Math.max(...filtered.map(r => r.nyse_pct), 0.01);
  const maxMonthlyPct = Math.max(...filtered.map(r => r.monthly_pct), 0.01);

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map((r, i) => {
    const flag = countryFlags[r.country] || '';
    return `
    <tr>
      <td class="rank">${i + 1}</td>
      <td class="symbol">${r.symbol}</td>
      <td class="name" title="${r.name}">${r.name}</td>
      <td class="country"><span class="flag">${flag}</span>${r.country}</td>
      <td class="num">${fmt(r.nyse)}</td>
      <td class="pct">
        <div class="bar-cell">
          <span>${r.nyse_pct.toFixed(2)}%</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${(r.nyse_pct / maxNysePct) * 100}%"></div></div>
        </div>
      </td>
      <td class="pct">
        <div class="bar-cell">
          <span>${r.monthly_pct.toFixed(4)}%</span>
          <div class="bar-bg"><div class="bar-fill orange" style="width:${(r.monthly_pct / maxMonthlyPct) * 100}%"></div></div>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('stats').textContent = `Showing ${filtered.length} of ${data.length} NYSE ADRs`;
}

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (col === 'rank') return;
    if (sortCol === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortCol = col;
      sortDir = (col === 'symbol' || col === 'name' || col === 'country') ? 'asc' : 'desc';
    }
    document.querySelectorAll('thead th').forEach(h => {
      h.classList.remove('active');
      h.querySelector('.arrow').textContent = '\u25B2';
    });
    th.classList.add('active');
    th.querySelector('.arrow').textContent = sortDir === 'asc' ? '\u25B2' : '\u25BC';
    render();
  });
});

document.getElementById('search').addEventListener('input', render);
document.getElementById('country-filter').addEventListener('change', render);

data = parseCSV(csvText);

const countries = [...new Set(data.map(r => r.country).filter(Boolean))].sort();
const countrySelect = document.getElementById('country-filter');
countries.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c;
  const flag = countryFlags[c] || '';
  opt.textContent = flag + ' ' + c;
  countrySelect.appendChild(opt);
});

render();
</script>
